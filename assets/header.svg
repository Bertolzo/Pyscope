<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0F"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <g opacity="0.15">
    <circle cx="100" cy="80" r="2" fill="#E0E0E8"/>
    <circle cx="250" cy="200" r="1.5" fill="#E0E0E8"/>
    <circle cx="500" cy="50" r="1" fill="#E0E0E8"/>
    <circle cx="800" cy="150" r="2" fill="#E0E0E8"/>
    <circle cx="1050" cy="100" r="1.5" fill="#E0E0E8"/>
    <circle cx="1100" cy="250" r="1" fill="#E0E0E8"/>
    <circle cx="50" cy="250" r="1" fill="#E0E0E8"/>
    <circle cx="350" cy="120" r="1.5" fill="#E0E0E8"/>
  </g>
  <g transform="translate(600, 130)" filter="url(#glowFilter)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#glow)" stroke-width="2"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="-42" y1="-42" x2="42" y2="42" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <line x1="-42" y1="42" x2="42" y2="-42" stroke="#10B981" stroke-width="0.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#E0E0E8"/>
  </g>
  <text x="600" y="230" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="72" font-weight="700" fill="url(#text)" filter="url(#glowFilter)">PyScope</text>
  <text x="600" y="265" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="400" fill="#8A8A9A" letter-spacing="3">ARCHITECTURAL OBSERVATORY</text>
</svg>
