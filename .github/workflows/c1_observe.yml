name: Run C1 Observe

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project name to observe'
        required: true
        default: 'Django'
      repo_url:
        description: 'Repository URL to use for the observation'
        required: true
        default: 'https://github.com/django/django.git'
      workdir_name:
        description: 'Workdir name used by the observer'
        required: false
        default: 'c1_django_remote'

jobs:
  c1_observe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install networkx typer rich pydantic

      - name: Run C1 observer
        env:
          PROJECT: ${{ github.event.inputs.project }}
          REPO_URL: ${{ github.event.inputs.repo_url }}
          WORKDIR: ${{ github.event.inputs.workdir_name }}
        run: |
          set -e
          python tools/c1_observe.py "$PROJECT" "$REPO_URL" "$WORKDIR"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c1-results-${{ github.run_id }}
          path: ${{ github.event.inputs.workdir_name }}
